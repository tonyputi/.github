name: Generate Semantic Release

on:
  workflow_call:
    inputs:
      github_app_id:
        description: 'GitHub App ID'
        required: true
        type: string
      php_version:
        description: 'PHP version to use for Composer commands during release (e.g. version bump in release.config exec plugin)'
        required: false
        type: string
        default: '8.4'
    secrets:
      github_app_private_key:
        description: 'GitHub App private key (PEM)'
        required: true
    outputs:
      release_published:
        description: "Whether a new release was published"
        value: ${{ jobs.generate-semantic-release.outputs.release_published }}
      release_version:
        description: "The semantic release version generated"
        value: ${{ jobs.generate-semantic-release.outputs.release_version }}

jobs:
  generate-semantic-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_published: ${{ steps.generate-semantic-release.outputs.release_published }}
      release_version: ${{ steps.generate-semantic-release.outputs.release_version }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2
      - name: Detect plugins from config
        id: detect
        run: |
          if [ -f "release.config.cjs" ]; then
            PACKAGES=$(node -e "
              const cfg = require('./release.config.cjs');
              const plugins = cfg.plugins || [];
              const names = plugins.map(p => Array.isArray(p) ? p[0] : p).filter(p => typeof p === 'string');
              console.log(names.map(p => '--package ' + p).join(' '));
            ")
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          elif [ -f "release.config.js" ]; then
            PACKAGES=$(node -e "
              const cfg = require('./release.config.js');
              const plugins = cfg.plugins || [];
              const names = plugins.map(p => Array.isArray(p) ? p[0] : p).filter(p => typeof p === 'string');
              console.log(names.map(p => '--package ' + p).join(' '));
            ")
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          else
            # Fallback to default plugins for backwards compatibility
            DEFAULT_PKGS="--package @semantic-release/commit-analyzer"
            DEFAULT_PKGS="$DEFAULT_PKGS --package @semantic-release/release-notes-generator"
            DEFAULT_PKGS="$DEFAULT_PKGS --package @semantic-release/github"
            DEFAULT_PKGS="$DEFAULT_PKGS --package @semantic-release/git"
            DEFAULT_PKGS="$DEFAULT_PKGS --package @semantic-release/exec"
            echo "packages=$DEFAULT_PKGS" >> $GITHUB_OUTPUT
          fi
      - name: Generate semantic release
        id: generate-semantic-release
        run: npx --package semantic-release@25 ${{ steps.detect.outputs.packages }} semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Summary
        run: |
          if [ "${{ steps.generate-semantic-release.outputs.release_published }}" = "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ### 🚀 Release Published

          | Field      | Value                                                              |
          |------------|--------------------------------------------------------------------|
          | Version    | \`v${{ steps.generate-semantic-release.outputs.release_version }}\` |
          | Repository | ${{ github.repository }}                                           |
          | Branch     | \`${{ github.ref_name }}\`                                         |
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ### ℹ️ No Release

          No new release was published. This could mean:
          - No releasable commits since last version
          - Commits don't follow conventional commit format
          EOF
          fi
