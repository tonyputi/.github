name: Release New Version

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release New Version
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/generate-semantic-release.yml
    with:
      github_app_id: ${{ vars.GH_APP_ID }}
    secrets:
      github_app_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
